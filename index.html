<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>News Summarizer</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="background"></div>

<div class="top-bar">
    <button id="themeToggle">🌙 Dark Mode</button>
</div>

<div class="container">
    <div class="card">
        
        <div class="header">
            <h1>📰 Hi I'm LexiAI</h1>
            <p>Paste a news article URL and get a clean AI summary</p>
        </div>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="https://example.com/article" />
            <button onclick="summarizeArticle()">Summarize</button>
        </div>

        <div id="status" class="status idle">💤 AI is waiting for a URL...</div>

        <div id="result" class="result-box hidden"></div>

    </div>
</div>

<footer class="footer">
    <a href="https://www.linkedin.com/in/mohammed-zuoriki-856133250/" target="_blank" class="social">LinkedIn</a>
    <a href="https://github.com/Code-tech77/" target="_blank" class="social">GitHub</a>
</footer>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
